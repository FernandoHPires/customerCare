version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uniDevelopments-app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: uniDevelopments-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: uni_developments
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: uni
      MYSQL_PASSWORD: uni123
    ports:
      - "3307:3306"
    volumes:
      - uniDevelopments_dbdata:/var/lib/mysql

volumes:
  uniDevelopments_dbdata:
